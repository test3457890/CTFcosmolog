<!DOCTYPE html>
<html>
<head>
    <title>Login - CosmoLog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <div class="user-profile">
            <h3 style="text-align: center; color: #1da1f2;">Login to CosmoLog</h3>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <button onclick="toggleDarkMode()" class="logout-btn" style="background: #444;">Toggle Dark Mode</button>
            </div>

            <div style="margin-top: 20px;">
                <input type="text" id="username" placeholder="Username" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="password" id="password" placeholder="Password" style="width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button onclick="login()" class="search-btn" style="width: 100%;">Login</button>
            </div>
            <div id="error" style="color: red; margin-top: 10px; text-align: center;"></div>
            
            <div style="margin-top: 20px; padding: 10px; background: #e8f4fd; border-radius: 5px; font-size: 13px;">
                <strong>Test accounts:</strong><br>
                cyber_newbie / password123<br>
                h4ck3r_man / (good luck)
            </div>
        </div>
    </div>
    <script>
        // NEW: Dark mode logic to persist the theme across pages
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
        }

        // Apply dark mode immediately if it was previously enabled
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    document.getElementById('error').innerText = data.error || 'Login failed';
                }
            } catch(e) {
                document.getElementById('error').innerText = 'Connection error. Is the server running?';
            }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
